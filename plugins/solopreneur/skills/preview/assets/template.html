<style>
  :root {
    color-scheme: light;
    --ink: #111827;
    --ink-soft: #4b5563;
    --rule: #e5e7eb;
    --accent: #1f2937;
    --bg: #fafaf9;
  }
  html, body { background: var(--bg); }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink-soft);
    line-height: 1.65;
    margin: 0;
  }
  main.doc {
    max-width: 768px;
    margin: 0 auto;
    padding: 4rem 1.5rem 8rem;
  }
  .doc h1 { font-size: 2.25rem; line-height: 1.2; color: var(--ink); font-weight: 700; letter-spacing: -.01em; margin: 0 0 .5rem; }
  .doc h2 { font-size: 1.5rem; line-height: 1.3; color: var(--ink); font-weight: 600; margin: 3rem 0 1rem; }
  .doc h3 { font-size: 1.125rem; color: var(--ink); font-weight: 600; margin: 2rem 0 .75rem; }
  .doc p  { margin: 0 0 1rem; }
  .doc ul, .doc ol { margin: 0 0 1rem; padding-left: 1.25rem; }
  .doc li { margin: .25rem 0; }
  .doc a  { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .doc strong { color: var(--ink); font-weight: 600; }
  .doc code { background: #f3f4f6; padding: .1em .35em; border-radius: 4px; font-size: .9em; }
  .doc hr { border: 0; border-top: 1px solid var(--rule); margin: 2.5rem 0; }
  .doc table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .95rem; }
  .doc th, .doc td { border-bottom: 1px solid var(--rule); padding: .6rem .5rem; text-align: left; vertical-align: top; }
  .doc th { color: var(--ink); font-weight: 600; }
  /* Side-bar emphasis block (use for callouts) */
  .doc .callout {
    border-left: 2px solid var(--accent);
    padding: .1rem 0 .1rem 1rem;
    margin: 1.25rem 0;
    color: var(--ink);
  }
  .doc .meta { font-size: .85rem; color: #9ca3af; margin: 0 0 2rem; }

  /* Revision changelog callout — the agent refreshes this each review
     round (see SKILL.md Step 5). Minimal modifier on the existing
     .callout: a touch more presence so the reader notices "what
     changed since last review" at the top of the page. */
  .doc .callout.revision-log { border-left-color: #1a7f37; }
  .doc .callout.revision-log strong { color: #1a7f37; }

  /* --- GitHub-diff-style revision markup ---
     On a post-feedback revision the agent wraps removed text in <del>
     (kept in place, struck through) and added/changed text in <ins>
     (highlighted). Semantic tags, so they render meaningfully even
     without CSS and are screen-reader friendly. Rules are intentionally
     unscoped (not under .doc) so they apply wherever the agent injects
     diff markup — inside paragraphs, tables, lists, or callouts. */
  del {
    background: #ffebe9;
    color: #82071e;
    text-decoration: line-through;
    text-decoration-color: rgba(130, 7, 30, .55);
    border-radius: 3px;
    padding: 0 .15em;
  }
  ins {
    background: #e6ffec;
    color: inherit;
    text-decoration: none; /* background is the signal — keep prose readable */
    border-radius: 3px;
    padding: 0 .15em;
  }

  /* Clean view gate. Toggled by the comment overlay's Clean / Show edits
     button. When body has .diff-clean: removed text is hidden entirely
     and added text reads as ordinary prose (no highlight). The page
     ships WITHOUT this class, so the diff is visible on load — the
     reader sees how their feedback was applied first, like a GitHub PR
     opening on the diff. */
  body.diff-clean del { display: none; }
  body.diff-clean ins { background: none; color: inherit; padding: 0; }

  /* --- Comment markers (Google Docs-style) ---
     Injected by comment-overlay.js. A commented span gets
     <mark class="cmt-mark">. Subtle amber fill so it reads as
     "annotated" without shouting; the bottom border keeps the edge
     visible against the near-white page background (color alone is a
     weak signal there). .cmt-flash is the click-pairing pulse. These
     rules are unscoped (not under .doc) so they apply wherever the
     overlay wraps text — paragraphs, tables, lists, callouts, and
     inside <del>/<ins> diff markup. */
  mark.cmt-mark {
    background: #fef3c7;
    color: inherit;
    border-bottom: 1px solid #f0c869;
    border-radius: 2px;
    padding: 0 .05em;
    cursor: pointer;
  }
  mark.cmt-mark:hover,
  mark.cmt-mark:focus-visible {
    background: #fde68a;
    outline: 2px solid #f0c869;
    outline-offset: 1px;
  }
  @keyframes cmtFlash {
    0%   { background: #fde68a; box-shadow: 0 0 0 4px rgba(240,200,105,.45); }
    100% { background: #fef3c7; box-shadow: 0 0 0 0 rgba(240,200,105,0); }
  }
  .cmt-flash { animation: cmtFlash .7s ease-out; }
  @media (prefers-reduced-motion: reduce) {
    .cmt-flash { animation: none; background: #fde68a; }
  }

  /* Diff/clean coexistence: a marker inside removed text stays hidden
     with its <del> in clean view; a marker inside <ins> reads as plain
     prose in clean view but keeps its own amber signal. Markers never
     restructure the diff tree (overlay wraps per text node). */
  body.diff-clean del mark.cmt-mark { display: none; }

  /* --- Desktop docked comment panel (>=1024px) --- */
  .cmt-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 320px;
    height: 100vh;
    background: #fff;
    border-left: 1px solid var(--rule);
    box-shadow: -2px 0 12px rgba(0,0,0,.04);
    display: none;
    flex-direction: column;
    z-index: 9997;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  body.cmt-has-panel .cmt-panel { display: flex; }
  /* Shift the reading column so the panel never covers prose. margin
     (not padding) so the page background doesn't bleed under the panel.
     Re-center the column within the remaining space. */
  body.cmt-has-panel main.doc {
    margin-right: 320px;
    margin-left: auto;
  }
  .cmt-panel-head {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--rule);
  }
  .cmt-panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .cmt-panel-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .cmt-panel-foot {
    border-top: 1px solid var(--rule);
    padding: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: #fafafa;
  }
  .cmt-empty {
    color: #9ca3af;
    font-size: 13px;
    padding: 18px 6px;
    text-align: center;
  }
  .cmt-card {
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 12px 13px;
    margin-bottom: 10px;
    background: #fff;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  .cmt-card:hover { border-color: #d1d5db; box-shadow: 0 1px 6px rgba(0,0,0,.05); }
  .cmt-card.cmt-flash { animation: cmtFlash .7s ease-out; }
  .cmt-card-quote {
    font-size: 12px;
    color: #6b7280;
    font-style: italic;
    border-left: 2px solid #f0c869;
    padding-left: 8px;
    margin-bottom: 8px;
    line-height: 1.45;
  }
  .cmt-card-body {
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .cmt-card.cmt-detached { opacity: .72; cursor: default; }
  .cmt-card-detached {
    margin-top: 8px;
    font-size: 11.5px;
    color: #b45309;
    background: #fffbeb;
    border-radius: 6px;
    padding: 4px 8px;
  }
  .cmt-card-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    justify-content: flex-end;
  }
  .cmt-act {
    min-width: 44px;
    min-height: 32px;
    padding: 6px 12px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink-soft);
    border-radius: 6px;
    font: inherit;
    font-size: 12.5px;
    cursor: pointer;
  }
  .cmt-act:hover { background: #f3f4f6; }
  .cmt-act-del { color: #b91c1c; border-color: #fca5a5; }
  .cmt-edit-ta {
    width: 100%;
    box-sizing: border-box;
    min-height: 70px;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
    resize: vertical;
  }
  .cmt-edit-row {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 8px;
  }

  /* Tool buttons (export + diff toggle) share one look in the panel
     footer (desktop) and the floating cluster (mobile). */
  .cmt-tool-btn {
    padding: 9px 14px;
    background: #1f2937;
    color: #fff;
    border: none;
    border-radius: 8px;
    font: 500 13px ui-sans-serif, system-ui, sans-serif;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.14);
  }
  .cmt-tool-btn:hover { background: #111827; }

  /* Mobile floating cluster: one tidy stack bottom-right, not three
     scattered fixed buttons fighting for the same corner. */
  .cmt-float-cluster {
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 9998;
    display: none;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }
  .cmt-fab {
    padding: 10px 16px;
    background: #1f2937;
    color: #fff;
    border: none;
    border-radius: 999px;
    font: 500 14px ui-sans-serif, system-ui, sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.2);
  }

  /* Mobile bottom sheet — reuses the modal vocabulary (radius, shadow,
     ink). Scrim + body-scroll lock handled in JS. */
  .cmt-sheet-scrim {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 10005;
  }
  .cmt-sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 10006;
    background: #fff;
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,.2);
    max-height: 80dvh;
    display: flex;
    flex-direction: column;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    animation: cmtSheetUp .24s cubic-bezier(.22,1,.36,1);
  }
  @keyframes cmtSheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .cmt-sheet { animation: none; }
  }
  .cmt-sheet-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: #d1d5db;
    margin: 8px auto 4px;
  }
  .cmt-sheet-head {
    display: flex;
    justify-content: flex-end;
    padding: 2px 12px 0;
  }
  .cmt-sheet-close {
    min-width: 44px;
    min-height: 44px;
    border: none;
    background: transparent;
    font-size: 18px;
    color: #6b7280;
    cursor: pointer;
  }
  .cmt-sheet-body {
    overflow-y: auto;
    padding: 4px 16px 24px;
  }

  /* Breakpoint: below 1024px hide the docked panel and surface the
     floating cluster + sheet path. Above it the panel docks. */
  @media (max-width: 1023px) {
    .cmt-panel { display: none !important; }
    body.cmt-has-panel main.doc { margin-right: auto; }
    .cmt-float-cluster { display: flex; }
  }
</style>
</head>
<body>

<main class="doc">
  <p class="meta">{{DATE}} · {{AUTHOR_OR_CONTEXT}}</p>
  <h1>{{TITLE}}</h1>

  <p>{{LEAD_PARAGRAPH}}</p>
