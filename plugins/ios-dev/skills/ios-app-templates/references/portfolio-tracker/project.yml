name: Pulse
options:
  bundleIdPrefix: com.hana
  deploymentTarget:
    iOS: "18.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "Q9DF4CGJX3"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
    info:
      path: Pulse/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: Pulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hana.pulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
