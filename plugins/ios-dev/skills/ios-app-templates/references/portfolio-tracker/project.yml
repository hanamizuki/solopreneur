name: Pulse
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "6.0"
    # DEVELOPMENT_TEAM intentionally omitted — with CODE_SIGN_STYLE: Automatic
    # Xcode picks the developer's personal team on first open. The demo
    # orchestrator can inject a specific team ID at copy-time if needed.
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
targets:
  Pulse:
    type: application
    platform: iOS
    sources:
      - path: Pulse
    info:
      path: Pulse/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UIUserInterfaceStyle: Dark
        CFBundleDisplayName: Pulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.pulse
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
