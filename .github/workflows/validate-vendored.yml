name: Validate vendored skills

on:
  pull_request:
    paths:
      - 'plugins/*/skills/**'
      - 'plugins/*/scripts/sync-vendored.sh'
      - 'plugins/solopreneur/scripts/sync-vendored.sh'
      - '.github/workflows/validate-vendored.yml'
  push:
    branches: [main]
    paths:
      - 'plugins/*/skills/**'
      - 'plugins/*/scripts/sync-vendored.sh'
      - 'plugins/solopreneur/scripts/sync-vendored.sh'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: [ai-engineer, android-dev, designer, ios-dev, neo4j-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Re-sync to pinned revs
        working-directory: plugins/${{ matrix.plugin }}
        run: ./scripts/sync-vendored.sh --pinned

      - name: Check for drift
        run: |
          # Exclude manifest.json — sync-vendored.sh always bumps `synced_at`
          # even in --pinned mode, so a freshly re-synced manifest legitimately
          # differs from the committed one. The rev field is what we care
          # about, and any rev mismatch would have triggered re-fetch and
          # produced file diffs in the skills/ directory.
          if ! git diff --exit-code \
                 -- 'plugins/${{ matrix.plugin }}/skills/' \
                 ':!plugins/${{ matrix.plugin }}/skills/_vendored/manifest.json'; then
            echo
            echo "::error::Vendored skill files in plugins/${{ matrix.plugin }}/ drift from pinned manifest revs."
            echo "::error::Either revert the hand-edits, or update the manifest and re-run sync-vendored.sh."
            exit 1
          fi
