name: Validate vendored skills

on:
  pull_request:
    paths:
      - 'plugins/*/skills/**'
      - 'plugins/*/vendor/**'
      - 'plugins/*/scripts/sync-vendored.sh'
      - '.github/workflows/validate-vendored.yml'
  push:
    branches: [main]
    paths:
      - 'plugins/*/skills/**'
      - 'plugins/*/vendor/**'
      - 'plugins/*/scripts/sync-vendored.sh'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: validate-vendored-${{ github.ref }}-${{ matrix.plugin }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        plugin: [ai-engineer, android-dev, designer, ios-dev, neo4j-dev]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Re-sync to pinned revs
        working-directory: plugins/${{ matrix.plugin }}
        run: ./scripts/sync-vendored.sh --pinned

      - name: Check for drift
        run: |
          # Diff covers skills/ (synced skill bodies) AND vendor/ (LICENSES) —
          # the sync writes into both. Exclude manifest.json and _VENDOR.md
          # sidecars: sync-vendored.sh always bumps `synced_at` timestamps in
          # both, even in --pinned mode, so a freshly re-synced manifest and
          # sidecars legitimately differ from committed ones. The rev field is
          # what we care about, and any rev mismatch would have triggered
          # re-fetch and produced file diffs outside these excluded paths.
          if ! git diff --exit-code \
                 -- 'plugins/${{ matrix.plugin }}/skills/' \
                    'plugins/${{ matrix.plugin }}/vendor/' \
                 ':!plugins/${{ matrix.plugin }}/vendor/manifest.json' \
                 ':!plugins/${{ matrix.plugin }}/skills/**/_VENDOR.md'; then
            echo
            echo "::error::Vendored skill files in plugins/${{ matrix.plugin }}/ drift from pinned manifest revs."
            echo "::error::Either revert the hand-edits, or update the manifest and re-run sync-vendored.sh."
            exit 1
          fi
