name: Sync vendored skills

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Single plugin to sync (leave empty to sync all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: [ai-engineer, android-dev, designer, ios-dev, neo4j-dev]
    concurrency:
      group: vendor-sync-${{ matrix.plugin }}
      cancel-in-progress: true
    steps:
      - name: Gate matrix entry on dispatch filter
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] \
             && [[ -n "${{ github.event.inputs.plugin }}" ]] \
             && [[ "${{ github.event.inputs.plugin }}" != "${{ matrix.plugin }}" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping (dispatch filter targets ${{ github.event.inputs.plugin }})."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Snapshot pre-sync manifest
        if: steps.gate.outputs.should_run == 'true'
        id: pre
        run: |
          cp plugins/${{ matrix.plugin }}/skills/_vendored/manifest.json \
             /tmp/manifest-pre.json

      - name: Run sync-vendored.sh
        if: steps.gate.outputs.should_run == 'true'
        working-directory: plugins/${{ matrix.plugin }}
        run: ./scripts/sync-vendored.sh

      - name: Detect changes
        if: steps.gate.outputs.should_run == 'true'
        id: diff
        run: |
          # sync-vendored.sh always bumps `synced_at` timestamps in manifest.json
          # and _VENDOR.md sidecars, so plain `git diff` is noisy. Compare
          # pre/post manifest revs instead — those only change when upstream
          # branch HEAD actually moved.
          PRE=/tmp/manifest-pre.json
          POST=plugins/${{ matrix.plugin }}/skills/_vendored/manifest.json
          changed=false
          count=$(jq '.sources | length' "$POST")
          for i in $(seq 0 $((count - 1))); do
            old=$(jq -r ".sources[$i].rev // \"\"" "$PRE")
            new=$(jq -r ".sources[$i].rev // \"\"" "$POST")
            if [[ "$old" != "$new" ]]; then
              changed=true
              break
            fi
          done
          if [[ "$changed" == "false" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream rev changes for ${{ matrix.plugin }}; reverting cosmetic timestamp updates."
            git checkout -- plugins/${{ matrix.plugin }}/
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build PR body
        if: steps.gate.outputs.should_run == 'true' && steps.diff.outputs.changed == 'true'
        id: body
        run: |
          POST=plugins/${{ matrix.plugin }}/skills/_vendored/manifest.json
          PRE=/tmp/manifest-pre.json
          {
            echo "Automated sync of vendored skills for **${{ matrix.plugin }}** plugin."
            echo
            echo "## Upstream rev changes"
            echo
            echo "| Source | Old rev | New rev | Compare |"
            echo "| --- | --- | --- | --- |"

            count=$(jq '.sources | length' "$POST")
            for i in $(seq 0 $((count - 1))); do
              name=$(jq -r ".sources[$i].name" "$POST")
              repo=$(jq -r ".sources[$i].repo" "$POST")
              old=$(jq -r ".sources[$i].rev // \"\"" "$PRE")
              new=$(jq -r ".sources[$i].rev // \"\"" "$POST")
              if [[ "$old" != "$new" ]]; then
                old_short="${old:0:8}"
                new_short="${new:0:8}"
                compare="${repo%.git}/compare/${old}...${new}"
                echo "| \`$name\` | \`$old_short\` | \`$new_short\` | [diff]($compare) |"
              fi
            done

            echo
            echo "---"
            echo
            echo "Generated by \`.github/workflows/sync-vendored.yml\`."
            echo "To re-sync manually: \`cd plugins/${{ matrix.plugin }} && ./scripts/sync-vendored.sh\`."
          } > /tmp/pr-body.md
          {
            echo 'body<<EOF'
            cat /tmp/pr-body.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update sync PR
        if: steps.gate.outputs.should_run == 'true' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: vendor-sync/${{ matrix.plugin }}
          base: main
          commit-message: |
            chore(${{ matrix.plugin }}): sync vendored skills

            Automated by .github/workflows/sync-vendored.yml.
          title: 'chore(${{ matrix.plugin }}): sync vendored skills'
          body: ${{ steps.body.outputs.body }}
          labels: |
            automated
            vendor-sync
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          delete-branch: true
