name: Validate humanly generated files

on:
  pull_request:
    paths:
      - 'plugins/marketer/skills/humanly/**'
      - '.github/workflows/validate-humanly.yml'
  push:
    branches: [main]
    paths:
      - 'plugins/marketer/skills/humanly/**'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: validate-humanly-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check generated prewrite files are current
        run: |
          # build-prewrite.py is pure stdlib; ubuntu-latest ships python3.
          # --check regenerates in-memory and exits 1 if either committed
          # generated/prewrite-{zh,en}.md drifts from the current sources.
          if ! python3 plugins/marketer/skills/humanly/scripts/build-prewrite.py --check; then
            echo
            echo "::error::humanly generated prewrite files are stale."
            echo "::error::Run: python3 plugins/marketer/skills/humanly/scripts/build-prewrite.py and commit the result."
            exit 1
          fi
